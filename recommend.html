<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Scenetype — 나의 향 결과</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"/>
  <style>
    :root{--bg:#fff;--surface:#f8f8f8;--card:#f2f2f2;--border:#e8e8e8;--text:#1a1a1a;--text2:#444;--muted:#888;--pink:#eb9bb4;--pink-light:#fff5f8;--pink-mid:#ffe4ef;--floral:#e8a0b8;--woody:#c4966a;--citrus:#d4be50;--oriental:#c47040;--musky:#9898b0;--type-color:#e8a0b8;--type-light:#fff5f8;}
    *{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;font-weight:400;overflow-x:hidden;}
    a{text-decoration:none;color:inherit;}

    /* NAV */
    .nav{position:fixed;top:0;left:0;right:0;z-index:200;background:#fff;border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;}
    .nav-logo{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;color:var(--text);}
    .nav-logo span{color:var(--pink);}
    .nav-actions{display:flex;gap:10px;}
    .btn-nav{padding:.52rem 1.2rem;font-size:.8rem;font-weight:600;border-radius:6px;border:1.5px solid var(--border);color:var(--muted);background:transparent;cursor:pointer;transition:all .18s;}
    .btn-nav:hover{border-color:var(--text);color:var(--text);}
    .btn-nav.pink{background:var(--pink);border-color:var(--pink);color:#fff;}
    .btn-nav.pink:hover{opacity:.88;}

    /* RESULT HERO */
    .result-hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:60px;padding:100px 80px 60px;background:#fff;position:relative;overflow:hidden;}
    .result-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 70% 40%,var(--type-light) 0%,transparent 65%);pointer-events:none;transition:background .6s;}

    /* left */
    .rh-kicker{display:inline-flex;align-items:center;gap:6px;font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--type-color);background:var(--type-light);padding:.32rem .85rem;border-radius:100px;margin-bottom:20px;opacity:0;animation:fadeUp .6s .2s forwards;}
    .rh-kicker-dot{width:6px;height:6px;border-radius:50%;background:var(--type-color);}
    .rh-typename{font-size:clamp(1.2rem,2.2vw,1.6rem);font-weight:700;color:var(--text);margin-bottom:14px;opacity:0;animation:fadeUp .6s .4s forwards;white-space:nowrap;}
    .rh-title{font-size:clamp(2.4rem,5vw,4rem);font-weight:800;line-height:1.15;letter-spacing:-.03em;margin-bottom:8px;opacity:0;animation:fadeUp .7s .3s forwards;}
    .rh-title .hl{color:var(--type-color);}
    .rh-desc{font-size:.95rem;line-height:1.85;color:var(--text2);max-width:440px;margin-bottom:22px;opacity:0;animation:fadeUp .7s .5s forwards;}
    .rh-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px;opacity:0;animation:fadeUp .7s .6s forwards;}
    .rh-tag{font-size:.7rem;font-weight:600;padding:.28rem .75rem;border-radius:100px;background:var(--type-light);color:var(--type-color);}
    .rh-actions{display:flex;gap:10px;opacity:0;animation:fadeUp .7s .7s forwards;}
    .btn-share{padding:.78rem 1.5rem;font-size:.82rem;font-weight:600;border-radius:8px;border:1.5px solid var(--border);color:var(--muted);background:transparent;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px;}
    .btn-share:hover{border-color:var(--text);color:var(--text);}
    .btn-retry{padding:.78rem 1.8rem;font-size:.82rem;font-weight:700;border-radius:8px;background:var(--pink);color:#fff;border:none;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(235,155,180,.22);}
    .btn-retry:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(235,155,180,.28);}

    /* right — profile card */
    .rh-right{opacity:0;animation:fadeIn .9s .8s forwards;}
    .profile-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.06);}
    .profile-card-title{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;}
    .score-rows{display:flex;flex-direction:column;gap:12px;}
    .score-row{display:flex;align-items:center;gap:12px;}
    .score-lbl{font-size:.68rem;font-weight:600;text-transform:uppercase;color:var(--muted);width:60px;flex-shrink:0;}
    .score-track{flex:1;height:6px;background:var(--surface);border-radius:3px;overflow:hidden;}
    .score-fill{height:100%;border-radius:3px;width:0%;transition:width 1.1s cubic-bezier(.4,0,.2,1);}
    .score-fill.floral{background:linear-gradient(90deg,#f4b8d0,#e890b0);}
    .score-fill.woody{background:linear-gradient(90deg,#d4a870,#b88040);}
    .score-fill.citrus{background:linear-gradient(90deg,#f0d860,#d4b830);}
    .score-fill.oriental{background:linear-gradient(90deg,#d49070,#b06030);}
    .score-fill.musky{background:linear-gradient(90deg,#b0b0c8,#8888a8);}
    .score-val{font-size:.72rem;font-weight:700;color:var(--text);width:30px;text-align:right;flex-shrink:0;}

    /* PERFUMES */
    .perfumes{padding:80px;background:var(--surface);}
    .perfumes-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px;}
    .sec-kicker{font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
    .sec-kicker-dot{width:5px;height:5px;border-radius:50%;background:var(--pink);}
    .sec-title{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;letter-spacing:-.02em;}
    .perfumes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

    .p-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;transition:all .22s;position:relative;overflow:hidden;}
    .p-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.08);}
    .p-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--type-color);transform:scaleX(0);transform-origin:left;transition:transform .35s;}
    .p-card:hover::before{transform:scaleX(1);}
    .p-rank{font-size:2.8rem;font-weight:800;color:var(--border);line-height:1;margin-bottom:14px;}
    .p-brand{font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .p-name{font-size:1.2rem;font-weight:800;color:var(--text);margin-bottom:18px;line-height:1.2;}
    .p-note-rows{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
    .p-note-row{display:flex;align-items:center;gap:8px;}
    .p-note-lbl{font-size:.6rem;font-weight:600;color:var(--muted);width:28px;flex-shrink:0;}
    .p-note-track{flex:1;height:4px;background:var(--surface);border-radius:2px;overflow:hidden;}
    .p-note-fill{height:100%;background:var(--type-color);border-radius:2px;opacity:.7;}
    .p-note-text{font-size:.62rem;color:var(--muted);white-space:nowrap;}
    .p-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
    .p-tag{font-size:.6rem;font-weight:600;padding:.2rem .55rem;border-radius:100px;background:var(--pink-light);color:var(--pink);}
    .p-desc{font-size:.82rem;line-height:1.8;color:var(--text2);border-top:1px solid var(--border);padding-top:14px;}

    /* OTHER TYPES */
    .other-types{padding:80px;background:#fff;}
    .types-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:32px;}
    .type-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:22px 18px;cursor:pointer;transition:all .22s;display:block;color:inherit;text-decoration:none;}
    .type-card:hover{border-color:var(--pink);transform:translateY(-3px);box-shadow:0 10px 28px rgba(235,155,180,.10);}
    .type-dot{width:36px;height:36px;border-radius:10px;margin-bottom:12px;}
    .type-name{font-size:.95rem;font-weight:700;margin-bottom:3px;}
    .type-ko{font-size:.72rem;color:var(--muted);}

    .traits-section { padding: 80px; background: #fff; border-bottom: 1px solid var(--border); }
    .trait-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-top: 24px; }
    .trait-item { background: var(--type-light); border-radius: 12px; padding: 20px; border: 1px solid var(--border); transition: transform 0.2s; }
    .trait-item:hover { transform: translateY(-2px); }
    .trait-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .trait-title { font-size: 0.95rem; font-weight: 700; color: var(--type-color); margin-bottom: 6px; }
    .trait-desc { font-size: 0.82rem; line-height: 1.6; color: var(--text2); }

    .season-section { padding: 80px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .season-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .season-tag { font-size: 0.75rem; font-weight: 600; padding: 0.4rem 1rem; border-radius: 100px; background: #fff; border: 1px solid var(--border); color: var(--text2); }

    /* TOAST */
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;font-size:.75rem;font-weight:500;padding:.75rem 1.6rem;border-radius:8px;z-index:999;transition:transform .3s;white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0);}

    /* FOOTER */
    .footer{padding:36px 80px;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .footer-logo{font-size:1.1rem;font-weight:800;color:var(--text);}
    .footer-logo span{color:var(--pink);}
    .footer-links{display:flex;gap:24px;}
    .footer-links a{font-size:.8rem;font-weight:500;color:var(--muted);transition:color .18s;}
    .footer-links a:hover{color:var(--text);}
    .footer-copy{font-size:.75rem;color:var(--muted);}

    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .reveal{opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;}
    .reveal.visible{opacity:1;transform:translateY(0);}

    @media (max-width: 768px) {
      .nav { padding: 0 20px; }
      .nav-menu { display: none; }
      .nav-cta { padding: 0.4rem 1rem; font-size: 0.75rem; }
      
      .hero, .page-hero, .sec, .hiw, .families, .picks, .quiz-cta, .result-hero, .perfumes, .other-types, .screen { 
        padding: 60px 24px !important; 
      }
    
      .hero, .result-hero, .page-hero, .quiz-cta, .sim-wrapper, .families-grid.musky { 
        grid-template-columns: 1fr !important; 
        gap: 32px; 
        text-align: center; 
      }
      
      .families-grid, .picks-grid, .note-grid, .types-grid, .perfumes-grid, .mbti-grid, .trait-grid, .mode-cards, .steps { 
        grid-template-columns: 1fr !important; 
      }
      
      .hero-title, .ph-title, .rh-title, .intro-title, .mode-title, .qc-title, .sec-title { 
        font-size: 2.2rem !important; 
      }
        
      .hero-actions, .hero-meta, .rh-actions, .stats-row, .intro-meta { 
        justify-content: center; 
        flex-wrap: wrap; 
      }
      .sec-kicker, .sec-title, .sec-sub, .rh-tags {
        justify-content: center;
        text-align: center;
      }
      .sec-sub { margin-left: auto; margin-right: auto; }
    
      .footer { flex-direction: column; gap: 16px; text-align: center; padding: 32px 24px; }
    }
  </style>
</head>

function animBar(fId,vId,target){
  document.getElementById(fId).style.width=target+'%';
  let c=0;const step=Math.max(1,Math.ceil(target/28));
  const t=setInterval(()=>{c=Math.min(c+step,target);document.getElementById(vId).textContent=c+'%';if(c>=target)clearInterval(t);},38);
}
function shareResult() {
  const url = window.location.href;

  // 1. Web Share API를 지원하는 모바일 환경인 경우 (카톡, 인스타, 문자 등 기본 공유창 띄움)
  if (navigator.share) {
    navigator.share({
      title: 'Scenetype — 나의 향 결과',
      text: '나에게 완벽하게 어울리는 향수를 확인해보세요!',
      url: url
    }).catch((error) => console.log('공유 실패 또는 취소:', error));
  } 
  // 2. Web Share API를 지원하지 않는 PC 환경 등인 경우 (링크 복사 + 토스트 알림)
  else {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(showToast);
    } else {
      const ta = document.createElement('textarea');
      ta.value = url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast();
    }
  }
}
function showToast(){const t=document.getElementById('toast');t.textContent='링크가 복사되었어요 ✓';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
